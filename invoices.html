<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice System • Invoices</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  <link href="./assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-soft">
    <div class="container">
      <a class="navbar-brand brand fw-bold" href="index.html">Invoice<span class="accent">Pro</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" data-page="index.html" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" data-page="clients.html" href="clients.html">Clients</a></li>
          <li class="nav-item"><a class="nav-link" data-page="invoices.html" href="invoices.html">Invoices</a></li>
          <li class="nav-item"><a class="nav-link" data-page="reports.html" href="reports.html">Reports</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-4 py-md-5">
    <div class="d-flex align-items-center justify-content-between mb-4">
      <div>
        <h1 class="h3 mb-1">Create Invoice</h1>
        <div class="text-muted-2">Build and save invoices</div>
      </div>
      <div>
        <a href="reports.html" class="btn btn-outline-light border-soft">Monthly Report</a>
      </div>
    </div>
    <div class="row g-3 g-md-4">
      <div class="col-lg-7" data-aos="fade-up">
        <div class="card p-3 p-md-4">
          <div id="alertArea"></div>
          <div class="form-floating mb-3">
            <select class="form-select" id="clientSelect" placeholder="Client"></select>
            <label for="clientSelect">Client</label>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="mb-0">Items</h5>
            <button class="btn btn-sm btn-primary" id="addRow">Add Item</button>
          </div>
          <div class="scroll-area">
            <div id="items"></div>
          </div>
        </div>
      </div>
      <div class="col-lg-5" data-aos="fade-up" data-aos-delay="40">
        <div class="card p-3 p-md-4 sticky-card">
          <div class="form-floating mb-3">
            <input class="form-control" id="tax" value="0" placeholder="Tax (%)">
            <label for="tax">Tax (%)</label>
          </div>
          <div class="mb-2 d-flex justify-content-between">
            <div class="text-muted-2">Subtotal</div>
            <div>$<span id="subtotal">0.00</span></div>
          </div>
          <div class="mb-2 d-flex justify-content-between">
            <div class="text-muted-2">Tax</div>
            <div>$<span id="taxAmount">0.00</span></div>
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <div class="text-muted-2">Total</div>
            <div class="total">$<span id="total">0.00</span></div>
          </div>
          <div class="d-grid mt-3">
            <button class="btn btn-primary" id="saveBtn">Save Invoice</button>
          </div>
        </div>
      </div>
    </div>
    <div class="my-4"><hr class="divider"></div>
    <div class="card p-3 p-md-4" data-aos="fade-up">
      <h5 class="card-title mb-3">All Invoices</h5>
      <div class="table-responsive">
        <table class="table table-striped table-hover align-middle" id="listTable">
          <thead><tr><th>#</th><th>Client</th><th>Date</th><th class="text-end">Total</th><th class="text-end">Actions</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/invoices.js"></script>
</body>
</html>
