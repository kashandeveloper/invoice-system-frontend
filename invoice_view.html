<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice • View</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/css/styles.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark border-bottom border-soft">
    <div class="container">
      <a class="navbar-brand brand fw-bold" href="index.html">Invoice<span class="accent">Pro</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" data-page="index.html" href="index.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" data-page="clients.html" href="clients.html">Clients</a></li>
          <li class="nav-item"><a class="nav-link" data-page="invoices.html" href="invoices.html">Invoices</a></li>
          <li class="nav-item"><a class="nav-link" data-page="reports.html" href="reports.html">Reports</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-4 py-md-5">
    <div class="card p-3 p-md-4" data-aos="fade-up">
      <div class="d-flex justify-content-between mb-3">
        <h5 class="mb-0">Invoice <span id="invNum"></span></h5>
        <a class="btn btn-primary" id="pdfBtn" target="_blank">Download PDF</a>
      </div>
      <div id="detail"></div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    async function jsonFetch(u,o){const r=await fetch(u,o);if(!r.ok)throw new Error("Error");return r.json()}
    const q=new URLSearchParams(location.search);const id=q.get("id");
    document.getElementById("invNum").textContent="#"+id;
    document.getElementById("pdfBtn").href="../api/invoices/pdf.php?id="+encodeURIComponent(id);
    (async ()=>{const d=await jsonFetch("../api/invoices/get.php?id="+encodeURIComponent(id));const el=document.getElementById("detail");let rows="";d.items.forEach(i=>{rows+=`<tr><td>${i.description}</td><td>${i.quantity}</td><td class="text-end">$${Number(i.price).toFixed(2)}</td></tr>`});el.innerHTML=`<div class="row mb-3"><div class="col"><div class="text-muted-2">Client</div><div class="h5">${d.client.name}</div><div>${d.client.email||""}</div><div>${d.client.phone||""}</div><div>${d.client.address||""}</div></div><div class="col text-end"><div class="text-muted-2">Created</div><div>${d.invoice.created_at}</div></div></div><div class="table-responsive"><table class="table"><thead><tr><th>Description</th><th>Qty</th><th class="text-end">Price</th></tr></thead><tbody>${rows}</tbody></table></div><div class="d-flex justify-content-end"><div class="w-100" style="max-width:420px"><div class="d-flex justify-content-between mb-1"><div class="text-muted-2">Subtotal</div><div>$${Number(d.invoice.subtotal).toFixed(2)}</div></div><div class="d-flex justify-content-between mb-1"><div class="text-muted-2">Tax</div><div>$${Number(d.invoice.tax_amount).toFixed(2)}</div></div><div class="d-flex justify-content-between"><div class="text-muted-2">Total</div><div class="total">$${Number(d.invoice.total).toFixed(2)}</div></div></div></div>`})()
  </script>
</body>
</html>
